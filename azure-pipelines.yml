# Build STL targeting x64, x86, arm64, arm64ec

variables:
  - template: azure-devops/config.yml

pr:
  drafts: false

stages:
##### Phase 1: Initial Builds #####
  - stage: Code_Format
    dependsOn: []
    displayName: 'Code Format'
    pool:
      name: ${{ variables.x64MediumPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64MediumPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/format-validation.yml

  - stage: Build_x64
    dependsOn: []
    displayName: 'Build x64'
    pool:
      name: ${{ variables.x64MediumPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64MediumPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: x64
          targetArch: x64
          targetPlatform: x64
          analyzeBuild: true
          buildBenchmarks: true
          numShards: 1
          configureTesting: false
          runTesting: false

  - stage: Build_x86
    dependsOn: []
    displayName: 'Build x86'
    pool:
      name: ${{ variables.x64MediumPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64MediumPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: x86
          targetArch: x86
          targetPlatform: x86
          analyzeBuild: true
          buildBenchmarks: true
          numShards: 1
          configureTesting: false
          runTesting: false

  - stage: Build_ARM64
    dependsOn: []
    displayName: 'Build ARM64'
    pool:
      name: ${{ variables.arm64PoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(arm64PoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: arm64
          targetArch: arm64
          targetPlatform: arm64
          analyzeBuild: true
          buildBenchmarks: true
          numShards: 1
          configureTesting: false
          runTesting: false

  - stage: Build_ARM64EC
    dependsOn: []
    displayName: 'Build ARM64EC'
    pool:
      name: ${{ variables.arm64PoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(arm64PoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: arm64
          targetArch: arm64
          targetPlatform: arm64ec
          analyzeBuild: true
          buildBenchmarks: true
          numShards: 1
          configureTesting: false
          runTesting: false

  - stage: Configure_Tests
    dependsOn: []
    displayName: 'Configure Tests'
    pool:
      name: ${{ variables.x64MediumPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64MediumPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: x64
          targetArch: x64
          targetPlatform: x64
          numShards: 1
          buildStl: false
          runTesting: false

##### Phase 2: Primary Test Architectures #####
  - stage: Test_x64
    dependsOn:
      - Code_Format
      - Build_x64
      - Build_x86
      - Build_ARM64
      - Build_ARM64EC
      - Configure_Tests
    displayName: 'Test x64'
    pool:
      name: ${{ variables.x64FastPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64FastPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: x64
          targetArch: x64
          targetPlatform: x64

  - stage: Test_ARM64
    dependsOn:
      - Code_Format
      - Build_x64
      - Build_x86
      - Build_ARM64
      - Build_ARM64EC
      - Configure_Tests
    displayName: 'Test ARM64'
    pool:
      name: ${{ variables.arm64PoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(arm64PoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: arm64
          targetArch: arm64
          targetPlatform: arm64

##### Phase 3: Secondary Test Architectures #####
  - stage: Test_x86
    dependsOn:
      - Test_x64
      - Test_ARM64
    displayName: 'Test x86'
    pool:
      name: ${{ variables.x64SlowPoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(x64SlowPoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: x86
          targetArch: x86
          targetPlatform: x86

  - stage: Test_ARM64EC
    dependsOn:
      - Test_x64
      - Test_ARM64
    displayName: 'Test ARM64EC'
    pool:
      name: ${{ variables.arm64PoolName }}
      demands: ${{ variables.poolDemands }}
    variables:
    - name: workRoot
      value: '$(arm64PoolWorkRoot)'
      readonly: true
    jobs:
      - template: azure-devops/build-and-test.yml
        parameters:
          hostArch: arm64
          targetArch: arm64
          targetPlatform: arm64ec
