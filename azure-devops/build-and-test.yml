parameters:
- name: hostArch
  type: string
- name: targetArch
  type: string
- name: targetPlatform
  type: string
- name: analyzeBuild
  type: boolean
  default: false
- name: asanBuild
  type: boolean
  default: false
- name: buildBenchmarks
  type: boolean
  default: false
- name: testTargets
  type: string
  default: 'STL-CI'
- name: numShards
  type: number
  default: 10
- name: configureTesting
  type: boolean
  default: true
- name: buildStl
  type: boolean
  default: true
- name: runTesting
  type: boolean
  default: true
- name: testsBuildOnly
  type: boolean
  default: false
jobs:
- job: '${{ parameters.targetPlatform }}'
  strategy:
    parallel: ${{ parameters.numShards }}
  timeoutInMinutes: 30
  steps:
  - template: checkout-self.yml
  - template: checkout-submodule.yml
    parameters:
      enabled: ${{ parameters.configureTesting }}
      path: 'llvm-project'
      url: 'https://github.com/llvm/llvm-project.git'
  - template: checkout-submodule.yml
    parameters:
      enabled: true
      path: 'boost-math'
      url: 'https://github.com/boostorg/math.git'
  - template: checkout-submodule.yml
    parameters:
      enabled: ${{ parameters.buildBenchmarks }}
      path: 'benchmarks/google-benchmark'
      url: 'https://github.com/google/benchmark.git'
  - template: cmake-configure-build.yml
    parameters:
      hostArch: ${{ parameters.hostArch }}
      targetArch: ${{ parameters.targetArch }}
      targetPlatform: ${{ parameters.targetPlatform }}
      analyzeBuild: ${{ parameters.analyzeBuild }}
      asanBuild: ${{ parameters.asanBuild }}
      configureTesting: ${{ parameters.configureTesting }}
      buildStl: ${{ parameters.buildStl }}
      testsBuildOnly: ${{ parameters.testsBuildOnly }}
  # Emit per-binary ASan usage telemetry (BinSkim BA2032) for ASan-instrumented
  # builds. See: https://aka.ms/useasan
  - ${{ if and(parameters.asanBuild, parameters.buildStl) }}:
    - task: BinSkim@4
      displayName: 'Emit ASan usage telemetry (BinSkim BA2032)'
      inputs:
        TargetPattern: guardianGlob
        AnalyzeTargetGlob: +:f|$(buildOutputLocation)\**\*.dll;+:f|$(buildOutputLocation)\**\*.exe
        toolVersion: '4.4.9'
      env:
        GDN_BINSKIM_RUNONLYRULES: BA2032
        GDN_BINSKIM_KIND: Fail;Pass;Informational
    - task: PostAnalysis@2
      displayName: 'Publish BinSkim BA2032 telemetry to Guardian'
  - template: build-benchmarks.yml
    parameters:
      hostArch: ${{ parameters.hostArch }}
      targetArch: ${{ parameters.targetArch }}
      targetPlatform: ${{ parameters.targetPlatform }}
      buildBenchmarks: ${{ parameters.buildBenchmarks }}
      compiler: cl
  - template: build-benchmarks.yml
    parameters:
      hostArch: ${{ parameters.hostArch }}
      targetArch: ${{ parameters.targetArch }}
      targetPlatform: ${{ parameters.targetPlatform }}
      buildBenchmarks: ${{ parameters.buildBenchmarks }}
      compiler: clang-cl
  - template: run-tests.yml
    parameters:
      hostArch: ${{ parameters.hostArch }}
      targetArch: ${{ parameters.targetArch }}
      targetPlatform: ${{ parameters.targetPlatform }}
      testTargets: ${{ parameters.testTargets }}
      runTesting: ${{ parameters.runTesting }}
